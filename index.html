<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>熊啊熊啊熊 · 图片/视频画质增强 + 水印</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-gradient: radial-gradient(ellipse at 30% 20%, rgba(168,175,255,0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(122,210,220,0.15) 0%, transparent 60%);
            --surface: rgba(255,255,255,0.75);
            --surface2: rgba(255,255,255,0.55);
            --accent: #6c5ce7;
            --accent2: #5a4fcf;
            --accent3: #00b894;
            --text: #1e1e2f;
            --text2: #5a5a7a;
            --border: rgba(0,0,0,0.12);
            --radius: 20px;
            --radius-sm: 14px;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
            --blur: blur(24px);
            --preview-bg: #ffffff;
        }
        body.dark-mode {
            --bg: #0f0f1a;
            --bg-gradient: radial-gradient(ellipse at 30% 20%, rgba(108,92,231,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(0,206,201,0.1) 0%, transparent 60%);
            --surface: rgba(25,25,45,0.8);
            --surface2: rgba(34,34,60,0.7);
            --text: #e0e0f0;
            --text2: #a0a0c0;
            --border: rgba(255,255,255,0.12);
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
            --preview-bg: #0a0a14;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
            background: var(--bg); background-image: var(--bg-gradient);
            height:100vh; overflow:hidden; color:var(--text);
            display:flex; justify-content:center; align-items:flex-start;
            padding:16px 16px 0;
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color:transparent;
            user-select:none; -webkit-user-select:none;
        }
        .app-container { width:100%; max-width:1300px; height:100%; display:flex; flex-direction:column; gap:12px; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:8px 4px 0; flex-shrink:0; }
        .theme-toggle { width:44px; height:44px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface2); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); cursor:pointer; font-size:1.3rem; display:flex; align-items:center; justify-content:center; transition:var(--transition); color:var(--text); box-shadow:var(--shadow); flex-shrink:0; }
        .theme-toggle:hover { background:var(--surface); border-color:var(--accent); transform:scale(1.05); }
        .logo { font-size:1.8rem; font-weight:700; letter-spacing:-0.5px; background:linear-gradient(135deg,var(--accent2),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; white-space:nowrap; }

        .sticky-preview { position:relative; flex-shrink:0; background:var(--surface); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow-lg); transition:background 0.3s; display:flex; flex-direction:column; }
        .preview-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; font-size:0.9rem; font-weight:600; color:var(--text); }
        .preview-title .title-text { display:flex; align-items:center; gap:8px; }
        .zoom-controls { display:flex; gap:4px; }
        .zoom-btn { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--surface2); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); cursor:pointer; font-size:0.8rem; font-weight:bold; display:flex; align-items:center; justify-content:center; color:var(--text); transition:var(--transition); box-shadow:0 2px 6px rgba(0,0,0,0.06); }
        .zoom-btn:hover { background:var(--surface); border-color:var(--accent); }
        .zoom-btn:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }

        .preview-container { position:relative; width:100%; height:45vh; max-height:550px; min-height:260px; background:var(--preview-bg); border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
        .preview-placeholder { color:var(--text2); text-align:center; font-size:0.95rem; line-height:1.8; opacity:0.7; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        .compare-view { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; transform-origin:0 0; will-change:transform; }
        .compare-view img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
        .compare-view .after-layer { position:absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; clip-path:inset(0 50% 0 0); display:flex; align-items:center; justify-content:center; }
        .compare-view .after-layer img { max-width:100%; max-height:100%; object-fit:contain; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        .compare-slider-line { position:absolute; top:0; bottom:0; width:5px; background:#ffffff; cursor:col-resize; z-index:25; box-shadow:0 0 14px rgba(0,0,0,0.6); touch-action:none; }
        .compare-slider-line::before { content:''; position:absolute; left:-18px; right:-18px; top:0; bottom:0; background:transparent; cursor:col-resize; z-index:-1; }
        .compare-slider-line::after { content:'⟷'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#ffffff; color:#333; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:bold; box-shadow:0 4px 16px rgba(0,0,0,0.5); pointer-events:none; }

        .corner-label { position:absolute; z-index:30; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; white-space:nowrap; background:rgba(0,0,0,0.45); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); color:#ff6b6b; pointer-events:none; }
        .corner-label.after { color:#51cf66; }

        .control-area { flex:1 1 auto; overflow-y:auto; min-height:0; display:grid; grid-template-columns:420px 1fr; gap:14px; align-items:start; padding-bottom:16px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
        .control-area::-webkit-scrollbar { width:5px; } .control-area::-webkit-scrollbar-track { background:transparent; } .control-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        @media (max-width:960px) { .control-area { grid-template-columns:1fr; } .preview-container { height:35vh; } .logo { font-size:1.4rem; } }
        .card { background:var(--surface); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px; transition:background 0.3s; }
        .card-title { font-size:0.95rem; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
        .card-title .dot { width:8px; height:8px; border-radius:50%; background:var(--accent3); box-shadow:0 0 10px var(--accent3); }

        .action-buttons-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
        .upload-file-row { display:flex; gap:12px; align-items:stretch; }
        .upload-box { flex:3; display:flex; align-items:stretch; }
        .file-list-box { flex:7; display:flex; flex-direction:column; }
        .upload-zone { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:14px 12px; text-align:center; cursor:pointer; transition:var(--transition); background:var(--surface2); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; }
        .upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:rgba(108,92,231,0.06); box-shadow:0 0 20px rgba(108,92,231,0.1); transform:translateY(-2px); }
        .upload-zone .upload-icon { font-size:1.8rem; display:block; margin-bottom:4px; }
        .upload-zone .upload-text { font-weight:600; font-size:0.85rem; }
        .upload-zone .upload-hint { color:var(--text2); font-size:0.72rem; margin-top:4px; }
        .upload-zone input[type="file"] { display:none; }
        .file-list { flex:1; max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; padding-right:4px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px; background:var(--surface2); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
        .file-list::-webkit-scrollbar { width:5px; } .file-list::-webkit-scrollbar-track { background:transparent; } .file-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        .file-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--surface); border-radius:10px; cursor:pointer; transition:var(--transition); border:1.5px solid transparent; font-size:0.78rem; }
        .file-item:hover { border-color:var(--accent); }
        .file-item.active { border-color:var(--accent3); background:rgba(0,206,201,0.08); box-shadow:0 0 16px rgba(0,206,201,0.1); }
        .file-item .thumb { width:32px; height:32px; border-radius:6px; object-fit:cover; flex-shrink:0; background:var(--preview-bg); border:1px solid var(--border); }
        .file-item .info { flex:1; min-width:0; }
        .file-item .info .name { font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.7rem; }
        .file-item .info .meta { font-size:0.68rem; color:var(--text2); }
        .file-item .remove-btn { width:22px; height:22px; border-radius:50%; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:0.75rem; transition:var(--transition); }
        .file-item .remove-btn:hover { background:rgba(231,76,60,0.15); color:var(--danger); }

        .preset-btns { display:flex; flex-wrap:wrap; gap:6px; }
        .preset-btn { padding:6px 13px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); color:var(--text); cursor:pointer; font-size:0.76rem; font-weight:500; transition:var(--transition); white-space:nowrap; }
        .preset-btn:hover { border-color:var(--accent); background:rgba(108,92,231,0.08); }
        .preset-btn.active-preset { border-color:var(--accent3); background:rgba(0,206,201,0.15); color:var(--accent3); font-weight:700; box-shadow:0 0 12px rgba(0,206,201,0.25); }
        .control-group { display:flex; flex-direction:column; gap:4px; }
        .control-group label { font-weight:500; font-size:0.78rem; color:var(--text2); display:flex; justify-content:space-between; align-items:center; }
        .control-group label .val { color:var(--accent2); font-weight:600; }
        .slider-input { -webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:var(--border); outline:none; cursor:pointer; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); cursor:pointer; border:3px solid #fff; box-shadow:0 0 12px rgba(108,92,231,0.4); }
        select.slider-input { height:36px; padding:0 10px; border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); border:1px solid var(--border); font-size:0.82rem; cursor:pointer; -webkit-appearance:auto; appearance:auto; }
        .btn { padding:10px 18px; border-radius:25px; border:none; cursor:pointer; font-weight:600; font-size:0.8rem; letter-spacing:0.3px; transition:var(--transition); display:inline-flex; align-items:center; gap:6px; justify-content:center; white-space:nowrap; }
        .btn-primary { background:linear-gradient(135deg,var(--accent),#8b5cf6); color:#fff; box-shadow:0 4px 16px rgba(108,92,231,0.4); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(108,92,231,0.5); }
        .btn-success { background:linear-gradient(135deg,#00b894,#00cec9); color:#fff; }
        .btn-success:hover { transform:translateY(-2px); }
        .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
        .btn-secondary:hover { border-color:var(--accent2); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
        .progress-bar-wrap { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); border-radius:2px; transition:width 0.3s; width:0%; }
        .progress-text { font-size:0.72rem; color:var(--text2); text-align:center; }
        .toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 20px; border-radius:25px; font-weight:600; font-size:0.85rem; animation:slideIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow:var(--shadow-lg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
        .toast.success { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.4); }
        .toast.error { background:rgba(231,76,60,0.15); color:#e74c3c; border:1px solid rgba(231,76,60,0.4); }
        .toast.info { background:rgba(108,92,231,0.15); color:#6c5ce7; border:1px solid rgba(108,92,231,0.4); }
        @keyframes slideIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
        .processing-indicator { animation:pulse 1.2s infinite; color:var(--accent3); }
        @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
        .watermark-preview { width:40px; height:40px; border-radius:4px; object-fit:contain; border:1px solid var(--border); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">🐻熊啊熊啊熊</div>
            <button class="theme-toggle" id="themeToggle" title="切换夜间模式">🌙</button>
        </div>

        <div class="sticky-preview" id="stickyPreview">
            <div class="preview-title">
                <div class="title-text"><span class="dot"></span>🔍 预览对比 — 拖动中间线查看效果</div>
                <div class="zoom-controls" id="zoomControls">
                    <button class="zoom-btn" id="zoomOutBtn" title="缩小">−</button>
                    <button class="zoom-btn" id="zoomResetBtn" title="重置">1:1</button>
                    <button class="zoom-btn" id="zoomInBtn" title="放大">+</button>
                </div>
            </div>
            <div class="preview-container" id="previewContainer"></div>
        </div>

        <div class="control-area">
            <div class="card" id="leftPanel">
                <div class="action-buttons-row" id="imageActions">
                    <button class="btn btn-primary" id="btnProcessOne" disabled>✨ 增强当前图片</button>
                    <button class="btn btn-success" id="btnProcessAll" disabled>🚀 批量处理全部</button>
                    <button class="btn btn-secondary" id="btnDownloadOne" disabled>💾 下载当前结果</button>
                    <button class="btn btn-secondary" id="btnDownloadAll" disabled>📦 打包下载全部</button>
                    <button class="btn btn-secondary" id="btnWatermarkOne" disabled>💧 当前加水印</button>
                    <button class="btn btn-secondary" id="btnWatermarkAll" disabled>💧 批量加水印</button>
                </div>

                <div id="imageUploadSection">
                    <div class="upload-file-row">
                        <div class="upload-box">
                            <div class="upload-zone" id="uploadZone">
                                <span class="upload-icon">📷</span>
                                <div class="upload-text">拖拽或点击上传</div>
                                <div class="upload-hint">JPG/PNG/WebP/BMP</div>
                                <input type="file" id="fileInput" accept="image/*" multiple>
                            </div>
                        </div>
                        <div class="file-list-box">
                            <div class="card-title" style="margin-bottom:6px;">
                                <span class="dot"></span>📋 列表 (<span id="fileCount">0</span>)
                                <button class="btn btn-secondary" id="btnListClear" style="margin-left:auto; padding:4px 12px; font-size:0.7rem; border-radius:15px;">🗑️ 清空</button>
                            </div>
                            <div class="file-list" id="fileList">
                                <div style="text-align:center;color:var(--text2);padding:20px;font-size:0.82rem;">还没有图片 📷</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="videoSection" style="display:none;">
                    <div class="card-title"><span class="dot"></span>🎬 上传视频</div>
                    <div class="upload-zone" id="videoUploadZone">
                        <span class="upload-icon">🎥</span>
                        <div class="upload-text">点击或拖拽上传视频</div>
                        <div class="upload-hint">MP4 / WebM / MOV</div>
                        <input type="file" id="videoInput" accept="video/*">
                    </div>
                    <div id="videoInfo" style="font-size:0.8rem; color:var(--text2);"></div>
                    <button class="btn btn-success" id="btnProcessVideo" disabled>🚀 开始增强视频</button>
                    <div class="progress-bar-wrap" id="videoProgressWrap" style="display:none;">
                        <div class="progress-bar-fill" id="videoProgressFill"></div>
                    </div>
                    <div class="progress-text" id="videoProgressText"></div>
                </div>

                <div class="card-title"><span class="dot"></span>💧 水印设置</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="file" id="watermarkInput" accept="image/png" style="display:none;">
                    <button class="btn btn-secondary" id="btnUploadWatermark" style="font-size:0.75rem;">📁 上传水印</button>
                    <img id="watermarkPreviewImg" class="watermark-preview" style="display:none;" alt="水印预览">
                    <label style="display:flex; align-items:center; gap:4px; font-size:0.75rem; margin-left:auto;">
                        <input type="checkbox" id="watermarkEnabled"> 启用水印
                    </label>
                </div>
                <div class="control-group" style="margin-top:4px;">
                    <label>水印大小 <span class="val" id="watermarkSizeVal">30%</span></label>
                    <input type="range" class="slider-input" id="watermarkSizeSlider" min="5" max="80" value="30" step="1">
                </div>
                <div class="control-group">
                    <label>边距 <span class="val" id="watermarkMarginVal">10px</span></label>
                    <input type="range" class="slider-input" id="watermarkMarginSlider" min="0" max="80" value="10" step="1">
                </div>

                <div style="margin-top:8px;">
                    <button class="btn btn-secondary" id="btnSwitchMode" style="width:100%;">🎬 切换到视频增强</button>
                </div>

                <div class="card-title"><span class="dot"></span>⚙️ 增强参数</div>
                <div class="preset-btns" id="presetBtns">
                    <button class="preset-btn active-preset" data-preset="mild">🌿 轻度增强（推荐）</button>
                    <button class="preset-btn" data-preset="standard">⭐ 标准增强</button>
                    <button class="preset-btn" data-preset="strong">🔥 强力增强</button>
                    <button class="preset-btn" data-preset="ai">🤖 AI风格</button>
                </div>
                <div class="control-group">
                    <label>🔪 锐化强度 <span class="val" id="sharpenVal">40%</span></label>
                    <input type="range" class="slider-input" id="sharpenSlider" min="0" max="200" value="40" step="1">
                </div>
                <div class="control-group">
                    <label>🔇 降噪级别 <span class="val" id="denoiseVal">低</span></label>
                    <select class="slider-input" id="denoiseSelect">
                        <option value="0">关闭降噪</option>
                        <option value="1" selected>低 (3×3)</option>
                        <option value="2">中 (5×5)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📐 放大倍数 <span class="val" id="upscaleVal">1×</span></label>
                    <select class="slider-input" id="upscaleSelect">
                        <option value="1" selected>1× 保持原尺寸</option>
                        <option value="1.5">1.5× 适度放大</option>
                        <option value="2">2× 高清放大</option>
                        <option value="3">3× 超分辨率</option>
                        <option value="4">4× 极限放大</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>🎨 对比度增强 <span class="val" id="contrastVal">8%</span></label>
                    <input type="range" class="slider-input" id="contrastSlider" min="0" max="60" value="8" step="1">
                </div>
                <div class="control-group">
                    <label>☀️ 亮度微调 <span class="val" id="brightnessVal">0</span></label>
                    <input type="range" class="slider-input" id="brightnessSlider" min="-30" max="30" value="0" step="1">
                </div>
                <div class="progress-bar-wrap" id="progressWrap" style="display:none;">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText"></div>
            </div>
            <div></div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (function() {
            // 图片相关 DOM
            const themeToggle = document.getElementById('themeToggle');
            const previewContainer = document.getElementById('previewContainer');
            const zoomOutBtn = document.getElementById('zoomOutBtn');
            const zoomResetBtn = document.getElementById('zoomResetBtn');
            const zoomInBtn = document.getElementById('zoomInBtn');
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const btnProcessOne = document.getElementById('btnProcessOne');
            const btnProcessAll = document.getElementById('btnProcessAll');
            const btnDownloadOne = document.getElementById('btnDownloadOne');
            const btnDownloadAll = document.getElementById('btnDownloadAll');
            const btnWatermarkOne = document.getElementById('btnWatermarkOne');
            const btnWatermarkAll = document.getElementById('btnWatermarkAll');
            const btnListClear = document.getElementById('btnListClear');
            const sharpenSlider = document.getElementById('sharpenSlider');
            const denoiseSelect = document.getElementById('denoiseSelect');
            const upscaleSelect = document.getElementById('upscaleSelect');
            const contrastSlider = document.getElementById('contrastSlider');

            // 图像处理函数
            function loadImage(src) { return new Promise((resolve, reject) => { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = src; }); }
            function imageToCanvas(img) { const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img, 0, 0); return c; }
            function boxBlurH(d, r) { const { data, width, height } = d; const o = new Uint8ClampedArray(data.length); for (let y = 0; y < height; y++) { for (let x = 0; x < width; x++) { let rs = 0, gs = 0, bs = 0, c = 0; const x0 = Math.max(0, x - r), x1 = Math.min(width - 1, x + r); for (let xi = x0; xi <= x1; xi++) { const i = (y * width + xi) * 4; rs += data[i]; gs += data[i + 1]; bs += data[i + 2]; c++; } const oi = (y * width + x) * 4; o[oi] = Math.round(rs / c); o[oi + 1] = Math.round(gs / c); o[oi + 2] = Math.round(bs / c); o[oi + 3] = data[oi + 3]; } } return new ImageData(o, width, height); }
            function boxBlurV(d, r) { const { data, width, height } = d; const o = new Uint8ClampedArray(data.length); for (let y = 0; y < height; y++) { for (let x = 0; x < width; x++) { let rs = 0, gs = 0, bs = 0, c = 0; const y0 = Math.max(0, y - r), y1 = Math.min(height - 1, y + r); for (let yi = y0; yi <= y1; yi++) { const i = (yi * width + x) * 4; rs += data[i]; gs += data[i + 1]; bs += data[i + 2]; c++; } const oi = (y * width + x) * 4; o[oi] = Math.round(rs / c); o[oi + 1] = Math.round(gs / c); o[oi + 2] = Math.round(bs / c); o[oi + 3] = data[oi + 3]; } } return new ImageData(o, width, height); }
            function gaussianBlur(canvas, sigma) { const ctx = canvas.getContext('2d'); const r = Math.max(1, Math.round(sigma * 1.5)); let idata = ctx.getImageData(0, 0, canvas.width, canvas.height); for (let i = 0; i < 3; i++) { idata = boxBlurH(idata, r); idata = boxBlurV(idata, r); } const c = document.createElement('canvas'); c.width = canvas.width; c.height = canvas.height; c.getContext('2d').putImageData(idata, 0, 0); return c; }
            function unsharpMask(canvas, amount) { const blurred = gaussianBlur(canvas, 2.0); const ctx = canvas.getContext('2d'); const orig = ctx.getImageData(0, 0, canvas.width, canvas.height); const blurCtx = blurred.getContext('2d'); const blur = blurCtx.getImageData(0, 0, canvas.width, canvas.height); const out = new Uint8ClampedArray(orig.data.length); const amt = amount / 100; for (let i = 0; i < orig.data.length; i += 4) { for (let c = 0; c < 3; c++) { let v = orig.data[i + c] + (orig.data[i + c] - blur.data[i + c]) * amt; out[i + c] = Math.max(0, Math.min(255, Math.round(v))); } out[i + 3] = orig.data[i + 3]; } const rc = document.createElement('canvas'); rc.width = canvas.width; rc.height = canvas.height; rc.getContext('2d').putImageData(new ImageData(out, canvas.width, canvas.height), 0, 0); return rc; }
            function medianFilter(canvas, size) { const ctx = canvas.getContext('2d'); const idata = ctx.getImageData(0, 0, canvas.width, canvas.height); const { data, width, height } = idata; const out = new Uint8ClampedArray(data.length); const half = Math.floor(size / 2); for (let y = 0; y < height; y++) { for (let x = 0; x < width; x++) { const rv = [], gv = [], bv = []; for (let dy = -half; dy <= half; dy++) { for (let dx = -half; dx <= half; dx++) { const nx = Math.min(width - 1, Math.max(0, x + dx)); const ny = Math.min(height - 1, Math.max(0, y + dy)); const i = (ny * width + nx) * 4; rv.push(data[i]); gv.push(data[i + 1]); bv.push(data[i + 2]); } } rv.sort((a, b) => a - b); gv.sort((a, b) => a - b); bv.sort((a, b) => a - b); const m = Math.floor(rv.length / 2); const o = (y * width + x) * 4; out[o] = rv[m]; out[o + 1] = gv[m]; out[o + 2] = bv[m]; out[o + 3] = data[o + 3]; } } const rc = document.createElement('canvas'); rc.width = width; rc.height = height; rc.getContext('2d').putImageData(new ImageData(out, width, height), 0, 0); return rc; }
            function adjustContrastBrightness(canvas, contrastPercent, brightness) { const ctx = canvas.getContext('2d'); const idata = ctx.getImageData(0, 0, canvas.width, canvas.height); const factor = 1 + contrastPercent / 100; for (let i = 0; i < idata.data.length; i += 4) { for (let c = 0; c < 3; c++) { let v = (idata.data[i + c] - 128) * factor + 128 + brightness; idata.data[i + c] = Math.max(0, Math.min(255, Math.round(v))); } } const rc = document.createElement('canvas'); rc.width = canvas.width; rc.height = canvas.height; rc.getContext('2d').putImageData(idata, 0, 0); return rc; }
            function upscaleImage(canvas, scale) { if (scale <= 1) return canvas; const tw = Math.round(canvas.width * scale), th = Math.round(canvas.height * scale); const steps = scale <= 1.5 ? 1 : scale <= 2 ? 2 : scale <= 3 ? 3 : 4; const stepScale = Math.pow(scale, 1 / steps); let current = canvas; for (let i = 0; i < steps; i++) { const sw = Math.round(current.width * stepScale), sh = Math.round(current.height * stepScale); const temp = document.createElement('canvas'); temp.width = sw; temp.height = sh; const tctx = temp.getContext('2d'); tctx.imageSmoothingEnabled = true; tctx.imageSmoothingQuality = 'high'; tctx.drawImage(current, 0, 0, sw, sh); current = temp; } const final = document.createElement('canvas'); final.width = tw; final.height = th; const fctx = final.getContext('2d'); fctx.imageSmoothingEnabled = true; fctx.imageSmoothingQuality = 'high'; fctx.drawImage(current, 0, 0, tw, th); return final; }

            async function enhanceImage(dataURL, params) {
                const img = await loadImage(dataURL);
                let canvas = imageToCanvas(img);
                if (params.denoise === '1') canvas = medianFilter(canvas, 3);
                else if (params.denoise === '2') canvas = medianFilter(canvas, 5);
                canvas = upscaleImage(canvas, parseFloat(params.upscale));
                if (parseInt(params.sharpen) > 0) canvas = unsharpMask(canvas, parseInt(params.sharpen));
                canvas = adjustContrastBrightness(canvas, parseInt(params.contrast), parseInt(params.brightness));
                return canvas.toDataURL('image/png');
            }

            async function addWatermark(imageDataURL, sizePercent, marginPx) {
                if (!watermarkImage) return imageDataURL;
                const baseImg = await loadImage(imageDataURL);
                const canvas = document.createElement('canvas');
                canvas.width = baseImg.width; canvas.height = baseImg.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(baseImg, 0, 0);
                const wmWidth = baseImg.width * sizePercent;
                const wmHeight = (wmWidth / watermarkImage.width) * watermarkImage.height;
                const x = baseImg.width - wmWidth - marginPx;
                const y = baseImg.height - wmHeight - marginPx;
                ctx.drawImage(watermarkImage, x, y, wmWidth, wmHeight);
                return canvas.toDataURL('image/png');
            }

            async function enhanceAndWatermark(dataURL, params) {
                let enhanced = await enhanceImage(dataURL, params);
                if (watermarkEnabled.checked && watermarkImage) {

            // 图片管理核心
            function generateId() { return 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
            function addFiles(newFiles) {
                const valid = /\.(jpg|jpeg|png|webp|bmp|tiff?|gif)$/i; let added = 0;
                Array.from(newFiles).forEach(file => {
                    if (!file.type.startsWith('image/') && !file.name.match(valid)) { showToast(`跳过非图片: ${file.name}`, 'error'); return; }
                    if (file.size > 50 * 1024 * 1024) { showToast(`文件过大(>50MB): ${file.name}`, 'error'); return; }
                    const id = generateId();
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const dataURL = e.target.result;
                        const img = new Image();
                        img.onload = function () {
                            const thumb = createThumbnail(img, 80);
                            files.push({ id, file, originalDataURL: dataURL, thumbnailDataURL: thumb, width: img.width, height: img.height, processedBlob: null, processedDataURL: null });
                            if (files.length === 1) activeFileId = id;
                            renderFileList(); updateButtons();
                            if (activeFileId === id || files.length === 1) showOriginalPreview();
                        };
                        img.src = dataURL;
                    };
                    reader.readAsDataURL(file); added++;
                });
                if (added > 0) showToast(`成功添加 ${added} 张图片`, 'success');
            }

            function createThumbnail(img, maxSize) {
                const canvas = document.createElement('canvas');
                const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
                canvas.width = Math.round(img.width * ratio); canvas.height = Math.round(img.height * ratio);
                const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled = true;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                return canvas.toDataURL('image/jpeg', 0.7);
            }

            function removeFile(id) {
                const idx = files.findIndex(f => f.id === id);
                if (idx >= 0) { const f = files[idx]; if (f.processedDataURL?.startsWith('blob:')) URL.revokeObjectURL(f.processedDataURL); files.splice(idx, 1); }
                if (activeFileId === id) activeFileId = files.length > 0 ? files[0].id : null;
                currentProcessedDataURL = null; renderFileList(); updateButtons();
                if (activeFileId) {
                    const af = files.find(f => f.id === activeFileId);
                    if (af?.processedDataURL) { currentProcessedDataURL = af.processedDataURL; showComparePreview(af.originalDataURL, af.processedDataURL); }

            }

            function renderFileList() {
                fileListEl.innerHTML = ''; fileCountEl.textContent = files.length;
                if (files.length === 0) fileListEl.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">还没有图片 📷</div>';
                else files.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
                    item.innerHTML = `<img class="thumb" src="${f.thumbnailDataURL}"><div class="info"><div class="name" title="${escapeHtml(f.file.name)}">${escapeHtml(f.file.name)}</div><div class="meta">${f.width}×${f.height} · ${formatSize(f.file.size)}${f.processedBlob ? ' ✅' : ''}</div></div><button class="remove-btn" data-id="${f.id}">✕</button>`;
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('.remove-btn')) return;
                        activeFileId = f.id; renderFileList(); updateButtons();
                        if (f.processedDataURL) { currentProcessedDataURL = f.processedDataURL; showComparePreview(f.originalDataURL, f.processedDataURL); }
                        else { currentProcessedDataURL = null; showOriginalPreview(); }
                    });
                    item.querySelector('.remove-btn').addEventListener('click', (e) => { e.stopPropagation(); removeFile(f.id); });
                    fileListEl.appendChild(item);
                });
            }

            function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
            function formatSize(b) { return b < 1024 ? b + ' B' : b < 1024 * 1024 ? (b / 1024).toFixed(1) + ' KB' : (b / (1024 * 1024)).toFixed(2) + ' MB'; }

            function updateButtons() {
                const af = activeFileId ? files.find(f => f.id === activeFileId) : null;
                btnProcessOne.disabled = !activeFileId || isProcessing;
                btnProcessAll.disabled = files.length === 0 || isProcessing;
                btnDownloadOne.disabled = !af?.processedBlob;
                btnDownloadAll.disabled = !files.some(f => f.processedBlob);
                btnWatermarkOne.disabled = !activeFileId || isProcessing || !watermarkImage;
                btnWatermarkAll.disabled = files.length === 0 || isProcessing || !watermarkImage;
            }

            function showPlaceholder() {
                previewContainer.innerHTML = `<div class="preview-placeholder"><span style="font-size:3rem;display:block;">🖼️</span>上传图片并点击左侧按钮增强<br>在此查看前后对比</div>`;
                compareViewEl = afterLayerEl = sliderLineEl = null;
                dragOffsetX = dragOffsetY = 0;
                removeSliderDocListeners();
                updateZoomButtons();
            }

            function showOriginalPreview() {
                const af = files.find(f => f.id === activeFileId); if (!af) { showPlaceholder(); return; }
                updateContainerSize();
                currentScale = 1; dragOffsetX = dragOffsetY = 0;
                previewContainer.innerHTML = `
                    <div class="compare-view" id="compareView" style="transform: translate(0px, 0px) scale(1);">
                        <img src="${af.originalDataURL}" alt="原图">
                    </div>
                    <div class="corner-label" style="bottom:10px; left:10px;">📷 原始图片（尚未增强）</div>`;
                compareViewEl = document.getElementById('compareView');
                afterLayerEl = sliderLineEl = null;
                removeSliderDocListeners();
                updateZoomButtons();
                applyBoundary();
            }

            function showComparePreview(originalDataURL, processedDataURL) {
                updateContainerSize();
                currentScale = 1; dragOffsetX = dragOffsetY = 0;
                previewContainer.innerHTML = `
                    <div class="compare-view" id="compareView" style="transform: translate(0px, 0px) scale(1);">
                        <img src="${processedDataURL}" alt="增强后">
                        <div class="after-layer" id="afterLayer" style="clip-path:inset(0 50% 0 0);">
                            <img src="${originalDataURL}" alt="原始">
                        </div>
                    </div>
                    <div class="compare-slider-line" id="compareSliderLine" style="left:50%;"></div>
                    <div class="corner-label" style="bottom:10px; left:10px;">📷 原始</div>
                    <div class="corner-label after" style="bottom:10px; right:10px;">✨ 增强后</div>`;
                compareViewEl = document.getElementById('compareView');
                afterLayerEl = document.getElementById('afterLayer');
                sliderLineEl = document.getElementById('compareSliderLine');
                setupCompareSlider();
                updateZoomButtons();
                applyBoundary();
            }

            function removeSliderDocListeners() {
                if (sliderDocHandlers.mousemove) {
                    document.removeEventListener('mousemove', sliderDocHandlers.mousemove);
                    document.removeEventListener('mouseup', sliderDocHandlers.mouseup);
                    document.removeEventListener('touchmove', sliderDocHandlers.touchmove);
                    document.removeEventListener('touchend', sliderDocHandlers.touchend);
                }
                sliderDocHandlers = {};
            }

            function setupCompareSlider() {
                if (!sliderLineEl || !afterLayerEl) return;
                removeSliderDocListeners();
                let dragging = false;
                function updateSlider(clientX) {
                    const rect = previewContainer.getBoundingClientRect();
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const pct = (x / rect.width) * 100;
                    sliderLineEl.style.left = pct + '%';
                    afterLayerEl.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
                }
                function onMouseMove(e) { if (!dragging) return; updateSlider(e.clientX); }
                function onMouseUp() { dragging = false; document.body.style.userSelect = ''; }
                function onTouchMove(e) { if (!dragging) return; updateSlider(e.touches[0].clientX); }
                function onTouchEnd() { dragging = false; document.body.style.userSelect = ''; }

                sliderLineEl.addEventListener('mousedown', (e) => { e.preventDefault(); dragging = true; document.body.style.userSelect = 'none'; });
                sliderLineEl.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; document.body.style.userSelect = 'none'; });

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('touchend', onTouchEnd);

                sliderDocHandlers = { mousemove: onMouseMove, mouseup: onMouseUp, touchmove: onTouchMove, touchend: onTouchEnd };
            }

            function applyBoundary() {
                if (!compareViewEl) return;
                if (containerWidth === 0 || containerHeight === 0) updateContainerSize();
                const scaledW = containerWidth * currentScale;
                const scaledH = containerHeight * currentScale;
                if (scaledW > containerWidth) dragOffsetX = Math.min(0, Math.max(containerWidth - scaledW, dragOffsetX));
                else dragOffsetX = (containerWidth - scaledW) / 2;
                if (scaledH > containerHeight) dragOffsetY = Math.min(0, Math.max(containerHeight - scaledH, dragOffsetY));
                else dragOffsetY = (containerHeight - scaledH) / 2;
            }

            function applyTransform() {
                if (!compareViewEl) return;
                compareViewEl.style.transform = `translate(${dragOffsetX}px, ${dragOffsetY}px) scale(${currentScale})`;
            }

            function setScale(scale) { currentScale = scale; applyBoundary(); applyTransform(); }
            function zoomToNextLevel() { for (let i = 0; i < ZOOM_LEVELS.length; i++) { if (currentScale < ZOOM_LEVELS[i] - 0.01) { setScale(ZOOM_LEVELS[i]); return; } } }
            function zoomToPrevLevel() { for (let i = ZOOM_LEVELS.length - 1; i >= 0; i--) { if (currentScale > ZOOM_LEVELS[i] + 0.01) { setScale(ZOOM_LEVELS[i]); return; } } }

            let isDraggingImage = false, dragStartX = 0, dragStartY = 0, startOffsetX = 0, startOffsetY = 0;
            function onDragStart(e) {
                if (!compareViewEl) return;
                if (e.target.closest('#compareSliderLine')) return;
                e.preventDefault();
                isDraggingImage = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStartX = clientX; dragStartY = clientY;
                startOffsetX = dragOffsetX; startOffsetY = dragOffsetY;
                document.body.style.userSelect = 'none';
            }
            function onDragMove(e) {
                if (!isDraggingImage || !compareViewEl) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragOffsetX = startOffsetX + (clientX - dragStartX);
                dragOffsetY = startOffsetY + (clientY - dragStartY);
                applyTransform();
            }
            function onDragEnd() {
                if (!isDraggingImage) return;
                isDraggingImage = false; document.body.style.userSelect = '';
                applyBoundary(); applyTransform();
            }

            let pinchStartDist = 0, pinchStartScale = 1;
            function getTouchDistance(touches) { const dx = touches[0].clientX - touches[1].clientX; const dy = touches[0].clientY - touches[1].clientY; return Math.sqrt(dx * dx + dy * dy); }
            function handleTouchStart(e) {
                if (!compareViewEl || !previewContainer.contains(e.target)) return;
                if (e.touches.length === 2) { e.preventDefault(); pinchStartDist = getTouchDistance(e.touches); pinchStartScale = currentScale; }
                else if (e.touches.length === 1) { onDragStart(e); }
            }
            function handleTouchMove(e) {
                if (!compareViewEl || !previewContainer.contains(e.target)) return;
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dist = getTouchDistance(e.touches);
                    if (pinchStartDist > 0) { let newScale = pinchStartScale * (dist / pinchStartDist); newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, Math.round(newScale * 10) / 10)); currentScale = newScale; applyBoundary(); applyTransform(); }
                } else if (e.touches.length === 1 && isDraggingImage) { onDragMove(e); }
            }
            function handleTouchEnd(e) { if (e.touches.length < 2) pinchStartDist = 0; if (e.touches.length === 0) onDragEnd(); }

            stickyPreview.addEventListener('wheel', (e) => { if (!compareViewEl || !previewContainer.contains(e.target)) return; e.preventDefault(); const delta = e.deltaY > 0 ? -0.2 : 0.2; let newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, Math.round((currentScale + delta) * 10) / 10)); setScale(newScale); }, { passive: false });
            previewContainer.addEventListener('mousedown', (e) => { if (!compareViewEl) return; if (e.target.closest('#compareSliderLine')) return; onDragStart(e); });
            document.addEventListener('mousemove', (e) => { if (isDraggingImage) onDragMove(e); });
            document.addEventListener('mouseup', onDragEnd);
            previewContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
            previewContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
            previewContainer.addEventListener('touchend', handleTouchEnd);

            zoomOutBtn.addEventListener('click', zoomToPrevLevel);
            zoomResetBtn.addEventListener('click', () => { dragOffsetX = dragOffsetY = 0; setScale(1); });
            zoomInBtn.addEventListener('click', zoomToNextLevel);

            function updateZoomButtons() { const hasView = compareViewEl !== null; zoomOutBtn.disabled = !hasView; zoomResetBtn.disabled = !hasView; zoomInBtn.disabled = !hasView; }

            function setProgress(pct, text) { progressFill.style.width = pct + '%'; progressText.textContent = text || ''; progressText.classList.toggle('processing-indicator', pct > 0 && pct < 100); }
            function showProgress(show) { progressWrap.style.display = show ? 'block' : 'none'; if (!show) progressFill.style.width = '0%'; }

            function triggerDownload(blob, filename) { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 3000); }
            function getOutputFilename(orig) { const dot = orig.lastIndexOf('.'); return (dot > 0 ? orig.substring(0, dot) : orig) + '_enhanced.png'; }

            function updateAllLabels() {
                sharpenValEl.textContent = sharpenSlider.value + '%';
                denoiseValEl.textContent = { '0': '关闭', '1': '低 (3×3)', '2': '中 (5×5)' }[denoiseSelect.value];
                upscaleValEl.textContent = ({ '1': '1×', '1.5': '1.5×', '2': '2×', '3': '3×', '4': '4×' })[upscaleSelect.value] + ' 放大';
                contrastValEl.textContent = contrastSlider.value + '%';
                brightnessValEl.textContent = brightnessSlider.value;
            }

            function setTheme(isDark) { if (isDark) { document.body.classList.add('dark-mode'); themeToggle.textContent = '☀️'; localStorage.setItem('bear-theme', 'dark'); } else { document.body.classList.remove('dark-mode'); themeToggle.textContent = '🌙'; localStorage.setItem('bear-theme', 'light'); } }
            const savedTheme = localStorage.getItem('bear-theme'); if (savedTheme === 'dark') setTheme(true); else setTheme(false);
            themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('dark-mode')));

            // 图片上传事件
            uploadZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', e => { if (e.target.files.length) { addFiles(e.target.files); fileInput.value = ''; } });
            uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
            uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
            uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
            document.addEventListener('dragover', e => { if (e.target.closest('#uploadZone') || e.target.closest('#previewContainer')) e.preventDefault(); });
            document.addEventListener('drop', e => { if (e.target.closest('#uploadZone') || (e.target.closest('#previewContainer') && e.dataTransfer.files.length)) { e.preventDefault(); addFiles(e.dataTransfer.files); } });

            [sharpenSlider, contrastSlider, brightnessSlider].forEach(s => s.addEventListener('input', updateAllLabels));
            [denoiseSelect, upscaleSelect].forEach(s => s.addEventListener('change', updateAllLabels));
            presetBtns.addEventListener('click', e => { const btn = e.target.closest('.preset-btn'); if (!btn) return; applyPreset(btn.dataset.preset); });

            applyPreset('mild'); updateAllLabels(); updateButtons(); showPlaceholder();
        })();
    </script>
</body>
</html>
